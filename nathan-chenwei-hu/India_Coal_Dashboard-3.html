const fmt=n=>{if(n==null||isNaN(n))return"—";if(Math.abs(n)>=1e6)return(n/1e6).toFixed(1)+"M";if(Math.abs(n)>=1e3)return(n/1e3).toFixed(1)+"K";return Number(n).toFixed(1)};

let charts={};
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id]}}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  ['national','regional','plants','data'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('hidden',t!==tab);
  });
  if(tab==='national')renderNational();
  if(tab==='regional')renderRegional();
  if(tab==='plants')renderPlants();
  if(tab==='data')renderDataTable();
}

    <div class="kpi"><div class="kpi-label">Total Receipt (Latest)</div><div class="kpi-value" style="color:#0e4d3a">${fmt(latest.TotalReceipt)}</div><div class="kpi-sub">${latest.Period} ('000T)</div></div>
    <div class="kpi"><div class="kpi-label">Total Consumption</div><div class="kpi-value" style="color:#2563eb">${fmt(latest.TotalConsump)}</div><div class="kpi-sub">${latest.Period} ('000T)</div></div>
    <div class="kpi"><div class="kpi-label">Closing Stocks</div><div class="kpi-value" style="color:#059669">${fmt(latest.ClosingStocks)}</div><div class="kpi-sub">${latest.Period} ('000T)</div></div>
    <div class="kpi"><div class="kpi-label">MoM Change</div><div class="kpi-value" style="color:${delta>=0?'#059669':'#dc2626'}">${(delta>0?'+':'')+fmt(delta)}</div><div class="kpi-sub">Receipt change ('000T)</div></div>
  </div>
  <div class="btn-row">
    <button class="btn active" onclick="natMetric('receipt',this)">Receipts vs Consumption</button>
    <button class="btn" onclick="natMetric('sources',this)">Source Breakdown</button>
    <button class="btn" onclick="natMetric('stocks',this)">Stock Position</button>
    <button class="btn" onclick="natMetric('mix',this)">Source Mix %</button>
  </div>
  <div class="chart-card"><h3 id="nat-title">Monthly Receipts vs Consumption ('000 Tonnes)</h3><canvas id="nat-chart" height="360"></canvas></div>`;

  document.getElementById('tab-national').innerHTML=html;
  natMetric('receipt',document.querySelector('#tab-national .btn'));
}

function natMetric(m,btn){
  document.querySelectorAll('#tab-national .btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  destroyChart('nat');
  const labels=DATA.allIndia.map(r=>sp(r.Period));
  const ctx=document.getElementById('nat-chart').getContext('2d');
  let config;

  if(m==='receipt'){
    document.getElementById('nat-title').textContent="Monthly Receipts vs Consumption ('000 Tonnes)";
    config={type:'line',data:{labels,datasets:[
      {label:'Receipt',data:DATA.allIndia.map(r=>r.TotalReceipt),borderColor:'#0e4d3a',backgroundColor:'#0e4d3a18',fill:true,tension:.3},
      {label:'Consumption',data:DATA.allIndia.map(r=>r.TotalConsump),borderColor:'#2563eb',backgroundColor:'#2563eb18',fill:true,tension:.3}
    ]},options:{responsive:true,plugins:{legend:{labels:{color:'#8a8577'}}},scales:{x:{ticks:{color:'#a09d95',maxRotation:45}},y:{ticks:{color:'#a09d95',callback:v=>fmt(v)}}}}};
  } else if(m==='sources'){
    document.getElementById('nat-title').textContent="Monthly Source Breakdown ('000 Tonnes)";
    config={type:'bar',data:{labels,datasets:Object.entries(SC).map(([k,c])=>({label:k,data:DATA.allIndia.map(r=>r[k]||0),backgroundColor:c,stack:'a'}))},options:{responsive:true,plugins:{legend:{labels:{color:'#8a8577'}}},scales:{x:{stacked:true,ticks:{color:'#a09d95',maxRotation:45}},y:{stacked:true,ticks:{color:'#a09d95',callback:v=>fmt(v)}}}}};
  } else if(m==='stocks'){
    document.getElementById('nat-title').textContent="Closing Stocks & Net Surplus/Deficit ('000 Tonnes)";
    config={type:'line',data:{labels,datasets:[
      {label:'Closing Stocks',data:DATA.allIndia.map(r=>r.ClosingStocks),borderColor:'#059669',backgroundColor:'#05966918',fill:true,tension:.3},
      {label:'Net Surplus/Deficit',data:DATA.allIndia.map(r=>r.NetSurplus),borderColor:'#dc2626',tension:.3,fill:false}
    ]},options:{responsive:true,plugins:{legend:{labels:{color:'#8a8577'}}},scales:{x:{ticks:{color:'#a09d95',maxRotation:45}},y:{ticks:{color:'#a09d95',callback:v=>fmt(v)}}}}};
  } else {
    document.getElementById('nat-title').textContent="Source Mix Over Time (%)";
    config={type:'line',data:{labels,datasets:[
      {label:'CIL',data:DATA.allIndia.map(r=>(r.CIL_pct||0)*100),borderColor:SC.CIL,backgroundColor:SC.CIL+'20',fill:true,tension:.3},
      {label:'Captive',data:DATA.allIndia.map(r=>(r.Captive_pct||0)*100),borderColor:SC.Captive,backgroundColor:SC.Captive+'20',fill:true,tension:.3},
      {label:'E-Auction',data:DATA.allIndia.map(r=>(r.EAuction_pct||0)*100),borderColor:SC.EAuction,backgroundColor:SC.EAuction+'20',fill:true,tension:.3},
      {label:'Import',data:DATA.allIndia.map(r=>(r.Import_pct||0)*100),borderColor:SC.Import,backgroundColor:SC.Import+'20',fill:true,tension:.3}
    ]},options:{responsive:true,plugins:{legend:{labels:{color:'#8a8577'}}},scales:{x:{ticks:{color:'#a09d95',maxRotation:45}},y:{ticks:{color:'#a09d95'},max:100}}}};
  }
  charts.nat=new Chart(ctx,config);
}

let regState={region:'all',view:'trend'};
function renderRegional(){
  const periods=[...new Set(DATA.regional.map(r=>r.Period))];
  const lp=periods[periods.length-1];
  const lr=DATA.regional.filter(r=>r.Period===lp);

  let html=`<div class="kpi-row">${lr.map(r=>`<div class="kpi"><div class="kpi-label">${r.Region} Region</div><div class="kpi-value" style="color:${RC[r.Region]}">${fmt(r.TotalReceipt)}</div><div class="kpi-sub">${r.Plants} plants | Stocks: ${fmt(r.ClosingStocks)}</div></div>`).join('')}</div>
  <div class="btn-row">
    <span class="label">Region:</span>
    <button class="btn btn-sm ${regState.region==='all'?'active':''}" onclick="regFilter('all',this)">All Regions</button>
    ${REGIONS.map(r=>`<button class="btn btn-sm" style="${regState.region===r?'background:'+RC[r]+';color:#fff;border-color:'+RC[r]:''}" onclick="regFilter('${r}',this)">${r}</button>`).join('')}
    <span class="sep">|</span>
    <span class="label">View:</span>
    <button class="btn btn-sm active-blue" onclick="regView('trend',this)">Receipt Trends</button>
    <button class="btn btn-sm" onclick="regView('compare',this)">Region Comparison</button>
    <button class="btn btn-sm" onclick="regView('stocks',this)">Stock Levels</button>
  </div>
  <div class="chart-card"><h3 id="reg-title">Total Receipts by Region ('000 Tonnes)</h3><canvas id="reg-chart" height="380"></canvas></div>`;

  document.getElementById('tab-regional').innerHTML=html;
  updateRegChart();
}

function regFilter(r,btn){regState.region=r;renderRegional()}
function regView(v,btn){regState.view=v;renderRegional()}

function updateRegChart(){
  destroyChart('reg');
  const periods=[...new Set(DATA.regional.map(r=>r.Period))];
  const labels=periods.map(sp);
  const ctx=document.getElementById('reg-chart').getContext('2d');
  let config;
  const lp=periods[periods.length-1];

  if(regState.view==='trend' && regState.region==='all'){
    document.getElementById('reg-title').textContent="Total Receipts by Region ('000 Tonnes)";
    config={type:'line',data:{labels,datasets:REGIONS.map(rg=>({label:rg,data:periods.map(p=>{const x=DATA.regional.find(r=>r.Period===p&&r.Region===rg);return x?x.TotalReceipt:0}),borderColor:RC[rg],tension:.3,fill:false}))},options:{responsive:true,plugins:{legend:{labels:{color:'#8a8577'}}},scales:{x:{ticks:{color:'#a09d95',maxRotation:45}},y:{ticks:{color:'#a09d95',callback:v=>fmt(v)}}}}};
  } else if(regState.view==='trend'){
    const rg=regState.region;
    document.getElementById('reg-title').textContent=rg+" Region — Receipts vs Consumption ('000 Tonnes)";
    const rd=DATA.regional.filter(r=>r.Region===rg);
    config={type:'line',data:{labels:rd.map(r=>sp(r.Period)),datasets:[
      {label:'Receipt',data:rd.map(r=>r.TotalReceipt),borderColor:RC[rg],backgroundColor:RC[rg]+'18',fill:true,tension:.3},
      {label:'Consumption',data:rd.map(r=>r.TotalConsump),borderColor:'#8a8577',tension:.3,fill:false}
    ]},options:{responsive:true,plugins:{legend:{labels:{color:'#8a8577'}}},scales:{x:{ticks:{color:'#a09d95',maxRotation:45}},y:{ticks:{color:'#a09d95',callback:v=>fmt(v)}}}}};
  } else if(regState.view==='compare'){
    const lr=DATA.regional.filter(r=>r.Period===lp);
    document.getElementById('reg-title').textContent="Latest Month — Regional Comparison ("+lp+")";
    config={type:'bar',data:{labels:lr.map(r=>r.Region),datasets:[
      {label:'Receipt',data:lr.map(r=>r.TotalReceipt),backgroundColor:'#0e4d3a'},
      {label:'Consumption',data:lr.map(r=>r.TotalConsump),backgroundColor:'#2563eb'},
      {label:'Stocks',data:lr.map(r=>r.ClosingStocks),backgroundColor:'#059669'}
    ]},options:{responsive:true,plugins:{legend:{labels:{color:'#8a8577'}}},scales:{x:{ticks:{color:'#8a8577'}},y:{ticks:{color:'#a09d95',callback:v=>fmt(v)}}}}};
  } else {
    document.getElementById('reg-title').textContent="Closing Stocks by Region ('000 Tonnes)";
    config={type:'line',data:{labels,datasets:REGIONS.map(rg=>({label:rg,data:periods.map(p=>{const x=DATA.regional.find(r=>r.Period===p&&r.Region===rg);return x?x.ClosingStocks:0}),borderColor:RC[rg],tension:.3,fill:false}))},options:{responsive:true,plugins:{legend:{labels:{color:'#8a8577'}}},scales:{x:{ticks:{color:'#a09d95',maxRotation:45}},y:{ticks:{color:'#a09d95',callback:v=>fmt(v)}}}}};
  }
  charts.reg=new Chart(ctx,config);
}

let plantState={region:'all',sort:'TotalReceipt',dir:'desc',search:'',selected:null};
function renderPlants(){
  let d=DATA.plants;
  if(plantState.region!=='all')d=d.filter(p=>p.Region===plantState.region);
  if(plantState.search)d=d.filter(p=>p.Plant.toLowerCase().includes(plantState.search.toLowerCase()));
  d=[...d].sort((a,b)=>{const av=a[plantState.sort]||0,bv=b[plantState.sort]||0;return plantState.dir==='desc'?bv-av:av-bv});

  const cols=[["Plant","Plant Name"],["Region","Region"],["InstalledMW","MW"],["TotalReceipt","Receipt"],["TotalConsump","Consump."],["LatestStocks","Stocks"],["AvgStockCover","Cover(D)"],["CIL_pct","CIL%"],["MarketCoal_pct","Mkt%"]];

  let html=`<div class="btn-row">
    <input class="search-input" placeholder="Search plants..." value="${plantState.search}" oninput="plantState.search=this.value;renderPlants()">
    <button class="btn btn-sm ${plantState.region==='all'?'active':''}" onclick="plantState.region='all';renderPlants()">All</button>
    ${REGIONS.map(r=>`<button class="btn btn-sm" style="${plantState.region===r?'background:'+RC[r]+';color:#fff;border-color:'+RC[r]:''}" onclick="plantState.region='${r}';renderPlants()">${r}</button>`).join('')}
    <span class="label" style="margin-left:8px">${d.length} plants</span>
  </div>`;

  if(plantState.selected){
    const p=DATA.plants.find(x=>x.Plant===plantState.selected);
    if(p){
      html+=`<div class="detail-card" style="border-color:${RC[p.Region]}40">
        <div class="detail-header"><div><h3>${p.Plant}</h3><span style="color:${RC[p.Region]};font-size:13px">${p.Region} Region</span><span style="color:#8a8577;font-size:13px;margin-left:12px">${fmtFull(p.InstalledMW)} MW</span></div><button class="close-btn" onclick="plantState.selected=null;renderPlants()">Close</button></div>
        <canvas id="plant-detail-chart" height="180"></canvas>
      </div>`;
    }
  }

  html+=`<div class="table-wrap"><div class="table-scroll"><table>
    <thead><tr>${cols.map(([k,l])=>`<th onclick="plantSort('${k}')">${l}${plantState.sort===k?(plantState.dir==='desc'?' ↓':' ↑'):''}</th>`).join('')}</tr></thead>
    <tbody>${d.slice(0,100).map(p=>`<tr onclick="plantState.selected='${p.Plant.replace(/'/g,"\\'")}';renderPlants()">
      <td>${p.Plant}</td><td style="color:${RC[p.Region]}">${p.Region}</td>
      <td class="num" style="text-align:right">${fmtFull(p.InstalledMW)}</td>
      <td class="num" style="text-align:right">${fmtFull(p.TotalReceipt)}</td>
      <td class="num" style="text-align:right">${fmtFull(p.TotalConsump)}</td>
      <td class="num" style="text-align:right">${fmtFull(p.LatestStocks)}</td>
      <td class="num" style="text-align:right">${p.AvgStockCover?Number(p.AvgStockCover).toFixed(1):'—'}</td>
      <td class="num" style="text-align:right">${pct(p.CIL_pct)}</td>
      <td class="num" style="text-align:right">${pct(p.MarketCoal_pct)}</td>
    </tr>`).join('')}</tbody></table></div></div>`;

  document.getElementById('tab-plants').innerHTML=html;

  if(plantState.selected){
    const p=DATA.plants.find(x=>x.Plant===plantState.selected);
    if(p){
      destroyChart('plantDetail');
      const sources=[['CIL',p.CIL],['SCCL',p.SCCL],['Captive',p.Captive],['E-Auction',p.EAuction],['Import',p.Import],['Others',p.Others]].filter(s=>s[1]>0);
      const ctx=document.getElementById('plant-detail-chart').getContext('2d');
      charts.plantDetail=new Chart(ctx,{type:'bar',data:{labels:sources.map(s=>s[0]),datasets:[{data:sources.map(s=>s[1]),backgroundColor:sources.map(s=>SC[s[0].replace('-','')]||'#8a8577')}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#a09d95',callback:v=>fmt(v)}},y:{ticks:{color:'#8a8577'}}}}});
    }
  }
}
function plantSort(k){if(plantState.sort===k)plantState.dir=plantState.dir==='desc'?'asc':'desc';else{plantState.sort=k;plantState.dir='desc'};renderPlants()}

let dataState={sheet:'allIndia',page:0};
function renderDataTable(){
  const sheets={
    allIndia:{label:'All-India Monthly',data:DATA.allIndia,cols:['Period','CIL','SCCL','Captive','EAuction','Import','Others','TotalReceipt','TotalConsump','ClosingStocks','NetSurplus']},
    regional:{label:'Regional Monthly',data:DATA.regional,cols:['Period','Region','Plants','CIL','SCCL','Captive','EAuction','Import','Others','TotalReceipt','TotalConsump','NetBalance','ClosingStocks']},
    plants:{label:'Plant Summary',data:DATA.plants,cols:['Plant','Region','InstalledMW','CIL','SCCL','Captive','EAuction','Import','Others','TotalReceipt','TotalConsump','LatestStocks','AvgStockCover']}
  };
  const cur=sheets[dataState.sheet];
  const PP=20,tp=Math.ceil(cur.data.length/PP);
  const pd=cur.data.slice(dataState.page*PP,(dataState.page+1)*PP);

  let html=`<div class="btn-row">
    ${Object.entries(sheets).map(([k,v])=>`<button class="btn ${dataState.sheet===k?'active':''}" onclick="dataState.sheet='${k}';dataState.page=0;renderDataTable()">${v.label}</button>`).join('')}
  </div>
  <div class="table-wrap"><div class="table-scroll"><table>
    <thead><tr>${cur.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${pd.map(row=>`<tr>${cur.cols.map(c=>`<td class="${typeof row[c]==='number'?'num':''}" style="text-align:${typeof row[c]==='number'?'right':'left'}">${typeof row[c]==='number'?fmtFull(row[c]):(row[c]||'—')}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div>
  <div class="pager">
    <span>Showing ${dataState.page*PP+1}–${Math.min((dataState.page+1)*PP,cur.data.length)} of ${cur.data.length}</span>
    <div style="display:flex;gap:6px">
      <button ${dataState.page===0?'disabled':''} onclick="dataState.page--;renderDataTable()">Prev</button>
      <button ${dataState.page>=tp-1?'disabled':''} onclick="dataState.page++;renderDataTable()">Next</button>
    </div>
  </div></div>`;

  document.getElementById('tab-data').innerHTML=html;
}

// Init
switchTab('national');
</script>
